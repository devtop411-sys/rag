server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy — forward to backend container.
    # Includes the MCP endpoint and its OAuth 2.1 flow:
    #   /mcp, /oauth/*, /.well-known/oauth-* (discovery must be publicly reachable)
    # Note: `mcp(?:/|$)` so /mcp-oauth-callback stays on the SPA.
    location ~ ^/(ingest|retrieve|search|documents|auth|slack|api|health|mcp(?:/|$)|oauth|\.well-known) {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 25M;
        # Streamable HTTP / SSE — do not buffer MCP responses
        proxy_buffering    off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}

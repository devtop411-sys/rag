name: Deploy to AWS EC2

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          VOYAGE_API_KEY:   ${{ secrets.VOYAGE_API_KEY }}
          QDRANT_URL:       ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY:   ${{ secrets.QDRANT_API_KEY }}
          API_KEY:          ${{ secrets.API_KEY }}
          SLACK_BOT_TOKEN:  ${{ secrets.SLACK_BOT_TOKEN }}
          DIFY_API_KEY:     ${{ secrets.DIFY_API_KEY }}
          GOOGLE_CLIENT_ID:          ${{ secrets.GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_DRIVE_CLIENT_ID }}
          OPENAI_API_KEY:            ${{ secrets.OPENAI_API_KEY }}
          S3_BUCKET:             ${{ secrets.S3_BUCKET }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          envs: VOYAGE_API_KEY,QDRANT_URL,QDRANT_API_KEY,API_KEY,SLACK_BOT_TOKEN,DIFY_API_KEY,GOOGLE_CLIENT_ID,VITE_GOOGLE_DRIVE_CLIENT_ID,OPENAI_API_KEY,S3_BUCKET,AWS_REGION,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY
          script: |
            set -e

            # Clone or update repository
            if [ -d "$HOME/rag-demo/.git" ]; then
              cd "$HOME/rag-demo"
              git fetch origin master
              git reset --hard origin/master
            else
              rm -rf "$HOME/rag-demo"
              git clone https://github.com/${{ github.repository }}.git "$HOME/rag-demo"
              cd "$HOME/rag-demo"
            fi

            # Create .env file
            echo "VOYAGE_API_KEY=$VOYAGE_API_KEY"     > .env
            echo "VOYAGE_MODEL=voyage-3.5"           >> .env
            echo "QDRANT_URL=$QDRANT_URL"            >> .env
            echo "QDRANT_API_KEY=$QDRANT_API_KEY"    >> .env
            echo "QDRANT_COLLECTION=investment_memos" >> .env
            echo "API_KEY=$API_KEY"                  >> .env
            echo "SLACK_BOT_TOKEN=$SLACK_BOT_TOKEN"  >> .env
            echo "DIFY_API_KEY=$DIFY_API_KEY"        >> .env
            echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID"         >> .env
            echo "VITE_GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID"               >> .env
            echo "VITE_GOOGLE_DRIVE_CLIENT_ID=$VITE_GOOGLE_DRIVE_CLIENT_ID" >> .env
            echo "OPENAI_API_KEY=$OPENAI_API_KEY"                          >> .env
            echo "S3_BUCKET=$S3_BUCKET"                          >> .env
            echo "AWS_REGION=${AWS_REGION:-us-east-1}"          >> .env
            echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID"         >> .env
            echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> .env

            # Restart Docker containers
            docker compose down || true
            docker compose up -d --build --remove-orphans

            # Clean unused Docker images
            docker image prune -af

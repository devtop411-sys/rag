services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT:              3001
      VOYAGE_API_KEY:    ${VOYAGE_API_KEY}
      VOYAGE_MODEL:      ${VOYAGE_MODEL:-voyage-3.5}
      QDRANT_URL:        ${QDRANT_URL}
      QDRANT_API_KEY:    ${QDRANT_API_KEY}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-investment_memos}
      API_KEY:           ${API_KEY}
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      OPENAI_MODEL:      ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL:   ${OPENAI_BASE_URL:-}
      SLACK_BOT_TOKEN:   ${SLACK_BOT_TOKEN}
      DIFY_API_KEY:      ${DIFY_API_KEY}
      GOOGLE_CLIENT_ID:  ${GOOGLE_CLIENT_ID:-}
      S3_BUCKET:            ${S3_BUCKET:-rag-files-340752823591}
      AWS_REGION:           ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID:    ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - uploads:/app/uploads
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "mcp-http.js"]
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      MCP_PORT:          3002
      VOYAGE_API_KEY:    ${VOYAGE_API_KEY}
      VOYAGE_MODEL:      ${VOYAGE_MODEL:-voyage-3.5}
      QDRANT_URL:        ${QDRANT_URL}
      QDRANT_API_KEY:    ${QDRANT_API_KEY}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-investment_memos}
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      OPENAI_MODEL:      ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL:   ${OPENAI_BASE_URL:-}
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL:                ${VITE_API_URL:-}
        VITE_API_KEY:                ${VITE_API_KEY:-}
        VITE_GOOGLE_CLIENT_ID:       ${GOOGLE_CLIENT_ID:-}
        VITE_GOOGLE_DRIVE_CLIENT_ID: ${VITE_GOOGLE_DRIVE_CLIENT_ID:-}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rag-net

volumes:
  uploads:

networks:
  rag-net:
    driver: bridge

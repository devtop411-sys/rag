services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT:              3001
      VOYAGE_API_KEY:    ${VOYAGE_API_KEY}
      VOYAGE_MODEL:      ${VOYAGE_MODEL:-voyage-3.5}
      QDRANT_URL:        ${QDRANT_URL}
      QDRANT_API_KEY:    ${QDRANT_API_KEY}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-investment_memos}
      API_KEY:           ${API_KEY}
    volumes:
      - uploads:/app/uploads
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_API_KEY: ${VITE_API_KEY:-}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rag-net

volumes:
  uploads:

networks:
  rag-net:
    driver: bridge

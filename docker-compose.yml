services:
  backend:
    image: ${ECR_REGISTRY}/${ECR_REPO_BACKEND}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      PORT: 3001
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      VOYAGE_MODEL: ${VOYAGE_MODEL:-voyage-3.5}
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-investment_memos}
      API_KEY: ${API_KEY}
    volumes:
      - uploads:/app/uploads
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/documents"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: ${ECR_REGISTRY}/${ECR_REPO_FRONTEND}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rag-net

volumes:
  uploads:

networks:
  rag-net:
    driver: bridge

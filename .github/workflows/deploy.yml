name: Deploy to AWS EC2

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # ── Clone repo on first run, pull on subsequent runs ───────────────
            if [ ! -d ~/rag-demo/.git ]; then
              git clone https://github.com/${{ github.repository }}.git ~/rag-demo
            fi

            cd ~/rag-demo
            git pull origin master

            # ── Write .env with secrets ────────────────────────────────────────
            cat > .env <<EOF
VOYAGE_API_KEY=${{ secrets.VOYAGE_API_KEY }}
VOYAGE_MODEL=${{ vars.VOYAGE_MODEL || 'voyage-3.5' }}
QDRANT_URL=${{ secrets.QDRANT_URL }}
QDRANT_API_KEY=${{ secrets.QDRANT_API_KEY }}
QDRANT_COLLECTION=investment_memos
API_KEY=${{ secrets.API_KEY }}
EOF

            # ── Build and start containers ─────────────────────────────────────
            docker compose up -d --build --remove-orphans
            docker image prune -f

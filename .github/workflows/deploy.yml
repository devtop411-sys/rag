name: Deploy to AWS EC2

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: VOYAGE_API_KEY,QDRANT_URL,QDRANT_API_KEY,API_KEY
          script: |
            set -e

            # Clone repository on first deploy
            if [ ! -d "$HOME/rag-demo/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$HOME/rag-demo"
            fi

            cd "$HOME/rag-demo"

            # Update repository
            git pull origin master

            # Create .env file
            cat > .env <<EOF
  VOYAGE_API_KEY=$VOYAGE_API_KEY
  VOYAGE_MODEL=voyage-3.5
  QDRANT_URL=$QDRANT_URL
  QDRANT_API_KEY=$QDRANT_API_KEY
  QDRANT_COLLECTION=investment_memos
  API_KEY=$API_KEY
  EOF
  
  # Verify generated env
  cat .env
  
  # Restart containers
  docker compose down || true
  docker compose up -d --build --remove-orphans
  
  # Cleanup old images
  docker image prune -af